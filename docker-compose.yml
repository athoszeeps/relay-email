services:
  relay-email:
    image: relay-email:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay-email
    ports:
      - "3001:3001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/relay/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
